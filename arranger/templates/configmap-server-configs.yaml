{{- $seen := dict -}}
{{- range .Values.config.catalogues -}}
  {{- if hasKey $seen .id -}}
    {{- fail (printf "Duplicate catalogue id %q — ids must be unique DNS labels" .id) -}}
  {{- end -}}
  {{- $_ := set $seen .id true -}}
{{- end -}}
{{- range .Values.config.catalogues }}
---
apiVersion: v1

kind: ConfigMap

metadata:
  name: {{ include "arranger.fullname" $ }}-server-configs-{{ .id }}
  labels:
    app.kubernetes.io/name: {{ include "arranger.name" $ }}
    helm.sh/chart: {{ include "arranger.chart" $ }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}

data:
  {{- if .configs.base }}
  base.json: |
    {{- .configs.base | toPrettyJson | nindent 4 }}
  {{- end }}

  {{- if .configs.extended }}
  extended.json: |
    {{- .configs.extended | toPrettyJson | nindent 4 }}
  {{- end }}

  {{- if .configs.facets }}
  facets.json: |
    {{- .configs.facets | toPrettyJson | nindent 4 }}
  {{- end }}

  {{- if .configs.matchbox }}
  matchbox.json: |
    {{- .configs.matchbox | toPrettyJson | nindent 4 }}
  {{- end }}

  {{- if .configs.table }}
  table.json: |
    {{- .configs.table | toPrettyJson | nindent 4 }}
  {{- end }}
{{- end }}
